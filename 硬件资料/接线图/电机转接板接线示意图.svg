<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .board { fill: #111827; stroke: #374151; stroke-width: 4; }
      .header { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .title { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .small { font: 500 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #374151; }
      .pin { fill: #f3f4f6; stroke: #111827; stroke-width: 2; }
      .pinText { font: 700 16px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .whiteText { fill: #ffffff; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .warn { font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #9a3412; }
      .wire24 { fill: none; stroke: #dc2626; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire5 { fill: none; stroke: #f59e0b; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wireG { fill: none; stroke: #111827; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wireTx { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wireRx { fill: none; stroke: #16a34a; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wireA { fill: none; stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wireB { fill: none; stroke: #0891b2; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .servo { fill: none; stroke: #db2777; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text class="header" x="800" y="54" text-anchor="middle">电机转接板接线示意图</text>
  <text class="small" x="800" y="84" text-anchor="middle">按板子正面观察：底部四个 6pin 电机接口，针脚从左到右为 B / A / GND / GND / 24V / 24V</text>

  <!-- ESP32-S3 -->
  <rect class="panel" x="70" y="140" width="270" height="310" rx="8"/>
  <text class="title" x="205" y="180" text-anchor="middle">ESP32-S3 开发板</text>
  <rect class="pin" x="105" y="225" width="86" height="36" rx="4"/><text class="pinText" x="148" y="243">5V</text>
  <rect class="pin" x="105" y="280" width="86" height="36" rx="4"/><text class="pinText" x="148" y="298">GND</text>
  <rect class="pin" x="105" y="335" width="86" height="36" rx="4"/><text class="pinText" x="148" y="353">GPIO17</text>
  <rect class="pin" x="105" y="390" width="86" height="36" rx="4"/><text class="pinText" x="148" y="408">GPIO18</text>
  <text class="small" x="212" y="249">5V 供电</text>
  <text class="small" x="212" y="304">公共地</text>
  <text class="small" x="212" y="359">TX</text>
  <text class="small" x="212" y="414">RX</text>

  <!-- 24V supply -->
  <rect class="panel" x="80" y="590" width="250" height="170" rx="8"/>
  <text class="title" x="205" y="630" text-anchor="middle">24V 电源</text>
  <rect class="pin" x="118" y="660" width="80" height="36" rx="4"/><text class="pinText" x="158" y="678">+24V</text>
  <rect class="pin" x="118" y="710" width="80" height="36" rx="4"/><text class="pinText" x="158" y="728">0V</text>
  <text class="small" x="210" y="684">接输入上孔</text>
  <text class="small" x="210" y="734">接输入下孔</text>

  <!-- Main adapter board -->
  <rect class="board" x="440" y="145" width="680" height="700" rx="18"/>
  <text class="title whiteText" x="780" y="187" text-anchor="middle">RS485 / 供电 / 舵机 转接板</text>

  <!-- Input terminal -->
  <rect class="pin" x="485" y="230" width="140" height="54" rx="6"/><text class="pinText" x="555" y="257">输入 +24V</text>
  <rect class="pin" x="485" y="298" width="140" height="54" rx="6"/><text class="pinText" x="555" y="325">输入 GND</text>
  <text class="small whiteText" x="640" y="252">24V 输入端子：上正</text>
  <text class="small whiteText" x="640" y="322">24V 输入端子：下负</text>

  <!-- USB debug power -->
  <text class="label whiteText" x="532" y="420">USB 调试</text>
  <rect class="pin" x="485" y="440" width="70" height="38" rx="4"/><text class="pinText" x="520" y="459">5V</text>
  <rect class="pin" x="565" y="440" width="70" height="38" rx="4"/><text class="pinText" x="600" y="459">G</text>

  <!-- TTL-485 debug -->
  <text class="label whiteText" x="780" y="420">TTL-485 调试</text>
  <rect class="pin" x="705" y="440" width="70" height="38" rx="4"/><text class="pinText" x="740" y="459">5V</text>
  <rect class="pin" x="785" y="440" width="70" height="38" rx="4"/><text class="pinText" x="820" y="459">G</text>
  <rect class="pin" x="865" y="440" width="70" height="38" rx="4"/><text class="pinText" x="900" y="459">R</text>
  <rect class="pin" x="945" y="440" width="70" height="38" rx="4"/><text class="pinText" x="980" y="459">T</text>

  <!-- Servo headers -->
  <text class="label whiteText" x="930" y="250">MG90S 舵机口</text>
  <g transform="translate(880 275)">
    <rect class="pin" x="0" y="0" width="70" height="34" rx="4"/><text class="pinText" x="35" y="17">PWM</text>
    <rect class="pin" x="78" y="0" width="58" height="34" rx="4"/><text class="pinText" x="107" y="17">5V</text>
    <rect class="pin" x="144" y="0" width="58" height="34" rx="4"/><text class="pinText" x="173" y="17">G</text>
    <rect class="pin" x="0" y="42" width="70" height="34" rx="4"/><text class="pinText" x="35" y="59">PWM</text>
    <rect class="pin" x="78" y="42" width="58" height="34" rx="4"/><text class="pinText" x="107" y="59">5V</text>
    <rect class="pin" x="144" y="42" width="58" height="34" rx="4"/><text class="pinText" x="173" y="59">G</text>
    <rect class="pin" x="0" y="84" width="70" height="34" rx="4"/><text class="pinText" x="35" y="101">PWM</text>
    <rect class="pin" x="78" y="84" width="58" height="34" rx="4"/><text class="pinText" x="107" y="101">5V</text>
    <rect class="pin" x="144" y="84" width="58" height="34" rx="4"/><text class="pinText" x="173" y="101">G</text>
    <rect class="pin" x="0" y="126" width="70" height="34" rx="4"/><text class="pinText" x="35" y="143">PWM</text>
    <rect class="pin" x="78" y="126" width="58" height="34" rx="4"/><text class="pinText" x="107" y="143">5V</text>
    <rect class="pin" x="144" y="126" width="58" height="34" rx="4"/><text class="pinText" x="173" y="143">G</text>
  </g>

  <!-- Motor ports -->
  <text class="label whiteText" x="780" y="602" text-anchor="middle">MG4010 电机接口（4 组相同）</text>
  <g id="motor-ports">
    <g transform="translate(485 625)">
      <text class="small whiteText" x="105" y="-14" text-anchor="middle">电机 1</text>
      <rect class="pin" x="0" y="0" width="42" height="42" rx="4"/><text class="pinText" x="21" y="21">B</text>
      <rect class="pin" x="42" y="0" width="42" height="42" rx="4"/><text class="pinText" x="63" y="21">A</text>
      <rect class="pin" x="84" y="0" width="42" height="42" rx="4"/><text class="pinText" x="105" y="21">G</text>
      <rect class="pin" x="126" y="0" width="42" height="42" rx="4"/><text class="pinText" x="147" y="21">G</text>
      <rect class="pin" x="168" y="0" width="42" height="42" rx="4"/><text class="pinText" x="189" y="21">24V</text>
      <rect class="pin" x="210" y="0" width="42" height="42" rx="4"/><text class="pinText" x="231" y="21">24V</text>
    </g>
    <g transform="translate(785 625)">
      <text class="small whiteText" x="105" y="-14" text-anchor="middle">电机 2</text>
      <rect class="pin" x="0" y="0" width="42" height="42" rx="4"/><text class="pinText" x="21" y="21">B</text>
      <rect class="pin" x="42" y="0" width="42" height="42" rx="4"/><text class="pinText" x="63" y="21">A</text>
      <rect class="pin" x="84" y="0" width="42" height="42" rx="4"/><text class="pinText" x="105" y="21">G</text>
      <rect class="pin" x="126" y="0" width="42" height="42" rx="4"/><text class="pinText" x="147" y="21">G</text>
      <rect class="pin" x="168" y="0" width="42" height="42" rx="4"/><text class="pinText" x="189" y="21">24V</text>
      <rect class="pin" x="210" y="0" width="42" height="42" rx="4"/><text class="pinText" x="231" y="21">24V</text>
    </g>
    <g transform="translate(485 725)">
      <text class="small whiteText" x="105" y="-14" text-anchor="middle">电机 3</text>
      <rect class="pin" x="0" y="0" width="42" height="42" rx="4"/><text class="pinText" x="21" y="21">B</text>
      <rect class="pin" x="42" y="0" width="42" height="42" rx="4"/><text class="pinText" x="63" y="21">A</text>
      <rect class="pin" x="84" y="0" width="42" height="42" rx="4"/><text class="pinText" x="105" y="21">G</text>
      <rect class="pin" x="126" y="0" width="42" height="42" rx="4"/><text class="pinText" x="147" y="21">G</text>
      <rect class="pin" x="168" y="0" width="42" height="42" rx="4"/><text class="pinText" x="189" y="21">24V</text>
      <rect class="pin" x="210" y="0" width="42" height="42" rx="4"/><text class="pinText" x="231" y="21">24V</text>
    </g>
    <g transform="translate(785 725)">
      <text class="small whiteText" x="105" y="-14" text-anchor="middle">电机 4</text>
      <rect class="pin" x="0" y="0" width="42" height="42" rx="4"/><text class="pinText" x="21" y="21">B</text>
      <rect class="pin" x="42" y="0" width="42" height="42" rx="4"/><text class="pinText" x="63" y="21">A</text>
      <rect class="pin" x="84" y="0" width="42" height="42" rx="4"/><text class="pinText" x="105" y="21">G</text>
      <rect class="pin" x="126" y="0" width="42" height="42" rx="4"/><text class="pinText" x="147" y="21">G</text>
      <rect class="pin" x="168" y="0" width="42" height="42" rx="4"/><text class="pinText" x="189" y="21">24V</text>
      <rect class="pin" x="210" y="0" width="42" height="42" rx="4"/><text class="pinText" x="231" y="21">24V</text>
    </g>
  </g>

  <!-- MG4010 motor -->
  <rect class="panel" x="1230" y="610" width="270" height="220" rx="8"/>
  <text class="title" x="1365" y="650" text-anchor="middle">MG4010-i10 电机</text>
  <rect class="pin" x="1270" y="680" width="70" height="34" rx="4"/><text class="pinText" x="1305" y="697">B/L</text>
  <rect class="pin" x="1270" y="722" width="70" height="34" rx="4"/><text class="pinText" x="1305" y="739">A/H</text>
  <rect class="pin" x="1270" y="764" width="70" height="34" rx="4"/><text class="pinText" x="1305" y="781">V-</text>
  <rect class="pin" x="1380" y="764" width="70" height="34" rx="4"/><text class="pinText" x="1415" y="781">V+</text>
  <text class="small" x="1355" y="700">RS485 B</text>
  <text class="small" x="1355" y="742">RS485 A</text>
  <text class="small" x="1355" y="785">电源负极 / 正极</text>

  <!-- MG90S servo -->
  <rect class="panel" x="1230" y="170" width="270" height="220" rx="8"/>
  <text class="title" x="1365" y="210" text-anchor="middle">MG90S 舵机</text>
  <rect class="pin" x="1270" y="245" width="78" height="34" rx="4"/><text class="pinText" x="1309" y="262">信号</text>
  <rect class="pin" x="1270" y="290" width="78" height="34" rx="4"/><text class="pinText" x="1309" y="307">5V</text>
  <rect class="pin" x="1270" y="335" width="78" height="34" rx="4"/><text class="pinText" x="1309" y="352">GND</text>
  <text class="small" x="1362" y="267">接 PWM</text>
  <text class="small" x="1362" y="312">接 5V</text>
  <text class="small" x="1362" y="357">接 G</text>

  <!-- Wires ESP32 to board -->
  <path class="wire5" d="M191 243 C315 243 370 459 485 459"/>
  <path class="wireG" d="M191 298 C330 298 390 459 565 459"/>
  <path class="wireTx" d="M191 353 C395 353 690 520 980 478"/>
  <path class="wireRx" d="M191 408 C390 408 640 510 900 478"/>
  <text class="small" x="337" y="237">ESP32 5V → USB调试 5V</text>
  <text class="small" x="360" y="316">ESP32 GND → USB调试 G</text>
  <text class="small" x="358" y="378">ESP32 TX(GPIO17) → T</text>
  <text class="small" x="358" y="431">ESP32 RX(GPIO18) → R</text>

  <!-- Power supply wires -->
  <path class="wire24" d="M198 678 C310 678 355 257 485 257"/>
  <path class="wireG" d="M198 728 C330 728 380 325 485 325"/>

  <!-- Servo wires -->
  <path class="servo" d="M1082 292 C1150 292 1195 262 1270 262"/>
  <path class="wire5" d="M1082 334 C1150 334 1195 307 1270 307"/>
  <path class="wireG" d="M1082 376 C1150 376 1195 352 1270 352"/>

  <!-- Motor wires from one representative port -->
  <path class="wireB" d="M485 646 C1125 646 1165 697 1270 697"/>
  <path class="wireA" d="M527 646 C1135 660 1165 739 1270 739"/>
  <path class="wireG" d="M569 646 C1140 700 1190 781 1270 781"/>
  <path class="wireG dash" d="M611 646 C1130 710 1200 781 1270 781"/>
  <path class="wire24" d="M653 646 C1135 720 1245 781 1380 781"/>
  <path class="wire24 dash" d="M695 646 C1145 730 1250 781 1380 781"/>

  <!-- Notes -->
  <rect class="note" x="430" y="880" width="740" height="80" rx="8"/>
  <text class="warn" x="455" y="912">上电前检查：</text>
  <text class="small" x="455" y="940">1. 24V 只接输入端子和电机接口 24V，不接 ESP32 或舵机 5V。</text>
  <text class="small" x="840" y="940">2. ESP32 TX 接 T，ESP32 RX 接 R；电机 A/B 接反时通常无回复。</text>

  <!-- Legend -->
  <g transform="translate(70 825)">
    <text class="title" x="0" y="0">线色说明</text>
    <line class="wire24" x1="0" y1="30" x2="55" y2="30"/><text class="small" x="70" y="35">24V+</text>
    <line class="wire5" x1="0" y1="60" x2="55" y2="60"/><text class="small" x="70" y="65">5V</text>
    <line class="wireG" x1="0" y1="90" x2="55" y2="90"/><text class="small" x="70" y="95">GND</text>
    <line class="wireTx" x1="165" y1="30" x2="220" y2="30"/><text class="small" x="235" y="35">TX → T</text>
    <line class="wireRx" x1="165" y1="60" x2="220" y2="60"/><text class="small" x="235" y="65">RX → R</text>
    <line class="wireA" x1="165" y1="90" x2="220" y2="90"/><text class="small" x="235" y="95">RS485 A</text>
    <line class="wireB" x1="330" y1="30" x2="385" y2="30"/><text class="small" x="400" y="35">RS485 B</text>
  </g>
</svg>
